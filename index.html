<!-- Script 1: Navigation, forms, utilities -->
<script>
// ─── NAVIGATION (unified .active class, scroll-to-top) ───
window.navigate = function(id) {
  const pages = document.querySelectorAll('.page');
  const target = document.getElementById('page-' + id);
  if (!target) { console.warn('Page not found: page-' + id); return; }
  pages.forEach(p => {
    p.classList.remove('active');
    p.style.display = 'none';
    p.style.opacity = '0';
  });
  target.style.display = 'block';
  // Force reflow, then fade in
  void target.offsetHeight;
  target.style.opacity = '1';
  target.classList.add('active');
  // Nav active state
  document.querySelectorAll('.nav-btn').forEach(btn => {
    const isActive = btn.dataset.page === id;
    btn.classList.toggle('text-[#4ade80]', isActive);
    btn.classList.toggle('text-white/70', !isActive);
    btn.style.textShadow = isActive ? '0 0 10px rgba(74,222,128,0.5)' : 'none';
  });
  // Close mobile menu if open
  const menu = document.getElementById('mobile-nav');
  if (menu && !menu.classList.contains('hidden') && typeof window.toggleMenu === 'function') {
    window.toggleMenu();
  }
  // Scroll to top
  requestAnimationFrame(() => {
    window.scrollTo({ top: 0, behavior: 'instant' });
    if (window.lenis) { window.lenis.scrollTo(0, { immediate: true }); }
    // Trigger stagger animations on new page
    setTimeout(() => window.triggerStagger && window.triggerStagger(), 50);
  });
};

// ─── NAVIGATE + SCROLL TO SECTION (AI Tools deep-link) ───
window.navigateAndScroll = function(pageId, sectionId) {
  window.navigate(pageId);
  setTimeout(() => {
    const el = document.getElementById(sectionId);
    if (!el) return;
    const offset = el.getBoundingClientRect().top + window.scrollY - 100;
    if (window.lenis) {
      window.lenis.scrollTo(offset, { duration: 1.2 });
    } else {
      window.scrollTo({ top: offset, behavior: 'smooth' });
    }
  }, 120);
};

// ─── MOBILE MENU ───
window.toggleMenu = function() {
  const menu = document.getElementById('mobile-nav');
  if (!menu) return;
  if (menu.classList.contains('hidden')) {
    menu.classList.remove('hidden');
    menu.classList.add('flex');
    gsap.fromTo(menu, { opacity: 0, y: -20 }, { opacity: 1, y: 0, duration: 0.35 });
  } else {
    gsap.to(menu, { opacity: 0, y: -20, duration: 0.25, onComplete: () => {
      menu.classList.add('hidden');
      menu.classList.remove('flex');
      menu.style.opacity = '';
      menu.style.transform = '';
    }});
  }
};

// ─── CHAT PANEL ───
window.openChat = function() {
  const panel = document.getElementById('chat-panel');
  const overlay = document.getElementById('chat-overlay');
  if (!panel) return;
  if (overlay) overlay.classList.remove('hidden');
  gsap.to(panel, { x: 0, duration: 0.8, ease: 'expo.out' });
};
window.closeChat = function() {
  const panel = document.getElementById('chat-panel');
  const overlay = document.getElementById('chat-overlay');
  if (!panel) return;
  if (overlay) overlay.classList.add('hidden');
  gsap.to(panel, { x: '100%', duration: 0.8, ease: 'expo.inOut' });
};

// ─── EMAIL VALIDATION ───
window.checkEmail = function(input) {
  if (!input) return;
  const icon = input.parentElement ? input.parentElement.querySelector('.email-check-icon') : null;
  const isValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(input.value.trim());
  input.style.borderColor = isValid ? '#4ade80' : '';
  input.style.boxShadow = isValid ? '0 0 18px rgba(74,222,128,0.12)' : '';
  if (icon) icon.style.opacity = isValid ? '1' : '0';
};

// ─── EMAIL FORM SUBMIT ───
window.handleEmailCapture = async function(e) {
  e.preventDefault();
  const form = e.target;
  const success = document.getElementById('email-success');
  const btn = form.querySelector('button[type="submit"]');
  if (!btn) return;
  const original = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner mx-auto"></div>';
  try {
    const res = await fetch(form.action, {
      method: 'POST',
      body: new FormData(form),
      headers: { Accept: 'application/json' }
    });
    if (!res.ok) throw new Error('Failed');
    form.style.display = 'none';
    if (success) {
      success.classList.remove('hidden');
      gsap.fromTo(success, { opacity: 0, y: 12 }, { opacity: 1, y: 0, duration: 0.45 });
    }
  } catch (err) {
    btn.disabled = false;
    btn.innerHTML = original;
    alert('There was a problem — please try again.');
  }
};

window.handleLabApplication = async function(e) {

<!-- Script 2: Signal Scanner (OpenAI live-scoring logic) -->
<script>
window.qs_scores = { clarity: 0, authority: 0, desire: 0 };

window.qs_scoreLive = function(text) {
  const words = text.trim().split(/\s+/).filter(Boolean);
  const wc = words.length;
  // Update word count
  const wcEl = document.getElementById('qs-wordcount');
  if (wcEl) wcEl.textContent = wc + ' word' + (wc !== 1 ? 's' : '');

  if (wc < 3) {
    ['clarity','authority','desire'].forEach(k => {
      const bar = document.getElementById('qs-meter-' + k + '-bar');
      const score = document.getElementById('qs-score-' + k);
      if (bar) bar.style.width = '0%';
      if (score) score.textContent = '--';
    });
    const fl = document.getElementById('qs-frequency-line');
    if (fl) fl.textContent = 'FREQUENCY: AWAITING INPUT. SYSTEM READY.';
    const btn = document.getElementById('qs-cta-phase1');
    if (btn) { btn.style.opacity = '0'; btn.style.pointerEvents = 'none'; }
    return;
  }

  const t = text.toLowerCase();
  // Clarity — specificity signals
  const claritySignals = ['founder','ceo','consultant','agency','$','revenue','clients','results','increase','grow','scale','b2b','saas','ecommerce','coach','service'];
  const clarityHits = claritySignals.filter(s => t.includes(s)).length;
  const clarityScore = Math.min(95, 20 + (clarityHits * 12) + Math.min(wc * 1.5, 25));

  // Authority — power/confidence language
  const authoritySignals = ['only','best','proven','guaranteed','expert','authority','premium','elite','senior','decade','years','award','featured','ranked'];
  const authorityNeg = ['try','maybe','sort of','kind of','help with','assist','support','affordable','cheap','flexible','budget'];
  const authHits = authoritySignals.filter(s => t.includes(s)).length;
  const authNeg = authorityNeg.filter(s => t.includes(s)).length;
  const authorityScore = Math.min(95, Math.max(10, 30 + (authHits * 15) - (authNeg * 18) + Math.min(wc * 0.8, 20)));

  // Desire — outcome/transformation language
  const desireSignals = ['result','outcome','transform','grow','scale','revenue','profit','roi','close','convert','attract','dream','want','need','deserve'];
  const desireHits = desireSignals.filter(s => t.includes(s)).length;
  const desireScore = Math.min(95, 20 + (desireHits * 14) + Math.min(wc * 1.2, 22));

  window.qs_scores = { clarity: clarityScore, authority: authorityScore, desire: desireScore };

  // Update meters
  const bars = { clarity: clarityScore, authority: authorityScore, desire: desireScore };
  Object.entries(bars).forEach(([k, v]) => {
    const bar = document.getElementById('qs-meter-' + k + '-bar');
    const scoreEl = document.getElementById('qs-score-' + k);
    if (bar) bar.style.width = v + '%';
    if (scoreEl) {
      const pct = Math.round(v);
      scoreEl.textContent = pct + '%';
      scoreEl.style.color = pct >= 70 ? '#4ade80' : pct >= 45 ? '#facc15' : '#ef4444';
    }
  });

  // Frequency line
  const avg = (clarityScore + authorityScore + desireScore) / 3;
  const fl = document.getElementById('qs-frequency-line');
  if (fl) {
    if (avg < 35) fl.textContent = 'FREQUENCY: MID-MARKET SIGNAL DETECTED. REPOSITIONING REQUIRED.';
    else if (avg < 55) fl.textContent = 'FREQUENCY: SIGNAL EMERGING. CONTRADICTIONS PRESENT.';
    else if (avg < 70) fl.textContent = 'FREQUENCY: AUTHORITY SIGNAL BUILDING. CLOSE TO THRESHOLD.';
    else fl.textContent = 'FREQUENCY: PREMIUM SIGNAL DETECTED. ABOVE THRESHOLD.';
    fl.style.color = avg >= 70 ? '#4ade80' : avg >= 45 ? '#facc15' : '#ef4444';
  }

  // Show CTA when enough words
  if (wc >= 12) {
    const btn = document.getElementById('qs-cta-phase1');
    if (btn) { btn.style.opacity = '1'; btn.style.pointerEvents = 'auto'; }
  }
};

window.qs_advanceToPhase2 = function() {

  const p1 = document.getElementById('qs-phase1');
  const p2 = document.getElementById('qs-phase2');

<!-- Script 4: Particles + Visual FX -->
<script>
const ParticleSystem = {
  init() {
    const canvas = document.getElementById('particle-canvas');
    if (!canvas || typeof THREE === 'undefined') return;
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 5;
    const geometry = new THREE.BufferGeometry();
    const count = window.innerWidth < 768 ? 800 : 1500;
    const positions = new Float32Array(count * 3);
    for (let i = 0; i < count * 3; i++) positions[i] = (Math.random() - 0.5) * 20;
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const material = new THREE.PointsMaterial({ color: 0x4ade80, size: 0.02, transparent: true, opacity: 0.4 });
    const particles = new THREE.Points(geometry, material);
    scene.add(particles);
    let mouseX = 0, mouseY = 0;
    document.addEventListener('mousemove', e => {
      mouseX = (e.clientX / window.innerWidth - 0.5) * 0.5;
      mouseY = (e.clientY / window.innerHeight - 0.5) * 0.5;
    });
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
    const animate = () => {
      requestAnimationFrame(animate);
      particles.rotation.x += 0.0003;
      particles.rotation.y += 0.0005;
      particles.rotation.x += (mouseY - particles.rotation.x) * 0.02;
      particles.rotation.y += (mouseX - particles.rotation.y) * 0.02;
      renderer.render(scene, camera);
    };
    animate();
  }
};

// ─── CUSTOM CURSOR ───
function initCursor() {
  if (!window.matchMedia('(pointer: fine)').matches) return;
  const dot = document.getElementById('cursor-dot');
  const ring = document.getElementById('cursor-ring');
  if (!dot || !ring) return;
  dot.style.display = 'block';
  ring.style.display = 'block';
  let rx = 0, ry = 0;
  document.addEventListener('mousemove', e => {
    dot.style.left = e.clientX + 'px';
    dot.style.top = e.clientY + 'px';
    rx += (e.clientX - rx) * 0.15;
    ry += (e.clientY - ry) * 0.15;
    ring.style.left = rx + 'px';
    ring.style.top = ry + 'px';
  });
  document.addEventListener('mouseover', e => {
    if (e.target.matches('a,button,[onclick]')) {
      dot.classList.add('hover');
      ring.classList.add('hover');
    }
  });
  document.addEventListener('mouseout', e => {
    if (e.target.matches('a,button,[onclick]')) {
      dot.classList.remove('hover');
      ring.classList.remove('hover');
    }
  });
  // Smooth ring follow via rAF
  (function loop() {
    requestAnimationFrame(loop);
    ring.style.left = rx + 'px';
    ring.style.top = ry + 'px';
  })();
}

// ─── 3D CARD TILT ───
function initTilt() {
  document.querySelectorAll('[data-tilt]').forEach(card => {
    card.addEventListener('mousemove', e => {
      const rect = card.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width;
      const y = (e.clientY - rect.top) / rect.height;
      const rotX = (y - 0.5) * 12;
      const rotY = (x - 0.5) * -12;
      card.style.transform = `perspective(1000px) rotateX(${rotX}deg) rotateY(${rotY}deg) translateZ(4px)`;
      card.style.setProperty('--mouse-x', (x * 100) + '%');
      card.style.setProperty('--mouse-y', (y * 100) + '%');
    });
    card.addEventListener('mouseleave', () => {
      card.style.transform = '';
      card.style.setProperty('--mouse-x', '50%');
      card.style.setProperty('--mouse-y', '50%');
    });
  });
}

// ─── MAGNETIC BUTTONS ───
function initMagnetic() {
  if (!window.matchMedia('(pointer: fine)').matches) return;
  document.querySelectorAll('.magnetic-btn').forEach(btn => {
    btn.addEventListener('mousemove', e => {
      const rect = btn.getBoundingClientRect();
      const dx = (e.clientX - rect.left - rect.width / 2) * 0.25;
      const dy = (e.clientY - rect.top - rect.height / 2) * 0.25;
      gsap.to(btn, { x: dx, y: dy, duration: 0.3, ease: 'power2.out' });
    });
    btn.addEventListener('mouseleave', () => {
      gsap.to(btn, { x: 0, y: 0, duration: 0.5, ease: 'elastic.out(1,0.5)' });
    });
  });
}

ParticleSystem.init();
initCursor();
initTilt();
initMagnetic();
</script>

<!-- Script 5: Counters + Stagger + Preloader -->
<script>
// ─── COUNTER ANIMATION ───
function initCounters() {
  document.querySelectorAll('.counter').forEach(el => {
    const target = parseFloat(el.dataset.target);
    const prefix = el.dataset.prefix || '';
    const suffix = el.dataset.suffix || '';
    const isFloat = target % 1 !== 0;
    let start = null;
    const duration = 2000;
    const step = ts => {
      if (!start) start = ts;
      const progress = Math.min((ts - start) / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      const val = target * eased;
      el.textContent = prefix + (isFloat ? val.toFixed(1) : Math.round(val)) + suffix;
      if (progress < 1) requestAnimationFrame(step);
    };
    const obs = new IntersectionObserver(entries => {
      if (entries[0].isIntersecting) { requestAnimationFrame(step); obs.disconnect(); }
    }, { threshold: 0.5 });
    obs.observe(el);
  });
}

// ─── STAGGER ANIMATION ───
window.triggerStagger = function() {
  document.querySelectorAll('.page.active .stagger:not(.visible)').forEach((el, i) => {
    const obs = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          setTimeout(() => el.classList.add('visible'), i * 60);
          obs.unobserve(el);
        }
      });
    }, { threshold: 0.1 });
    obs.observe(el);
    // Also trigger immediately if in viewport
    const rect = el.getBoundingClientRect();
    if (rect.top < window.innerHeight * 0.95) {
      setTimeout(() => el.classList.add('visible'), i * 60);
    }
  });
};

// ─── MOBILE ACTION BAR ───
function initMobileBar() {
  const bar = document.getElementById('mobile-action-bar');
  if (!bar) return;
  let shown = false;
  window.addEventListener('scroll', () => {
    if (window.scrollY > 300 && !shown) {
      shown = true;
      bar.style.transform = 'translateY(0)';
    } else if (window.scrollY < 100 && shown) {
      shown = false;
      bar.style.transform = 'translateY(100%)';
    }
  }, { passive: true });
}

// ─── PARALLAX ───
function initParallax() {
  const bg = document.getElementById('parallax-bg');
  const noise = document.getElementById('parallax-noise');
  document.addEventListener('mousemove', e => {
    const x = (e.clientX / window.innerWidth - 0.5) * 20;
    const y = (e.clientY / window.innerHeight - 0.5) * 20;
    if (bg) bg.style.transform = `translate(${x}px,${y}px)`;
    if (noise) noise.style.transform = `translate(${x * 0.5}px,${y * 0.5}px)`;
  });
}

// ─── PRELOADER — fixed: resolves before blocking page ───
function initPreloader() {
  const preloader = document.getElementById('quantum-preloader');
  const percent = document.getElementById('loader-percent');
  const loaderText = document.getElementById('loader-text');
  if (!preloader || !percent) {
    // No preloader DOM — just make sure home page is visible
    window.navigate('home');
    return;
  }
  const messages = ['INITIALIZING NEURAL NET','CALIBRATING SIGNAL','LOADING QUANTUM SYSTEM','READY'];
  let progress = 0;
  let msgIdx = 0;
  const interval = setInterval(() => {
    progress += Math.random() * 18 + 5;
    if (progress > 100) progress = 100;
    percent.textContent = Math.round(progress) + '%';
    const newIdx = Math.min(Math.floor(progress / 34), messages.length - 1);
    if (newIdx !== msgIdx && loaderText) {
      msgIdx = newIdx;
      gsap.fromTo(loaderText, { y: 0, opacity: 1 }, { y: -14, opacity: 0, duration: 0.2, onComplete: () => {
        loaderText.textContent = messages[msgIdx];
        gsap.fromTo(loaderText, { y: 14, opacity: 0 }, { y: 0, opacity: 1, duration: 0.2 });
      }});
    }
    if (progress >= 100) {
      clearInterval(interval);
      setTimeout(() => {
        gsap.to(preloader, { opacity: 0, duration: 0.8, ease: 'power2.inOut', onComplete: () => {
          preloader.style.display = 'none';
          // Ensure home page is visible
          window.navigate('home');
          window.triggerStagger();
          initCounters();
          // Lenis smooth scroll
          if (typeof Lenis !== 'undefined') {
            window.lenis = new Lenis({ duration: 1.2, easing: t => Math.min(1,1.001-Math.pow(2,-10*t)), smooth: true });
            const raf = time => { window.lenis.raf(time); requestAnimationFrame(raf); };
            requestAnimationFrame(raf);
          }
        }});
      }, 200);
    }
  }, 80);
}

// ─── LUCIDE ICONS ───
if (window.lucide) lucide.createIcons();

// ─── INIT ───
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => {
    initPreloader();
    initMobileBar();
    initParallax();
  });
} else {
  initPreloader();
  initMobileBar();
  initParallax();
}
// Re-init icons after any dynamic content
window.addEventListener('load', () => {
  if (window.lucide) lucide.createIcons();
  window.triggerStagger();
  initTilt();
  initMagnetic();
});
</script>
